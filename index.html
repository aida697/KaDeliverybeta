<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KaDelivery Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #FFD700; --bg: #050505; --card: #121212; --nav: rgba(18, 18, 18, 0.9); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        .page { display: none; min-height: 100vh; opacity: 0; transform: scale(0.98); transition: all 0.3s ease; }
        .page.active { display: block; opacity: 1; transform: scale(1); }

        /* Dribbble Nav Bar */
        #main-nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150%);
            width: 90%; max-width: 450px; background: var(--nav); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 10px;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #main-nav.show { transform: translateX(-50%) translateY(0); }
        
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-radius: 30px; transition: 0.3s; color: #666; font-weight: 700; }
        .nav-item.active-pill { background: var(--brand); color: black; }
        .nav-text { display: none; font-size: 14px; }
        .nav-item.active-pill .nav-text { display: block; }

        /* Floating Checkout Bar */
        #checkout-bar {
            position: fixed; bottom: 110px; left: 5%; width: 90%; 
            background: var(--brand); color: black; border-radius: 24px;
            padding: 18px 24px; display: none; justify-content: space-between;
            align-items: center; font-weight: 800; z-index: 999;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-page" class="page active flex flex-col items-center justify-center px-10">
        <div class="w-24 h-24 bg-[#FFD700] rounded-[30px] flex items-center justify-center mb-8 shadow-2xl">
            <span class="text-black text-4xl font-black italic">Ka</span>
        </div>
        <h1 class="text-4xl font-black mb-10 text-center">Elite Delivery</h1>
        <button onclick="login()" class="w-full py-6 bg-[#FFD700] text-black font-black rounded-3xl text-xl">ENTER KITCHEN</button>
    </div>

    <div id="home-page" class="page pt-16 px-6 pb-40">
        <h2 class="text-sm font-bold text-yellow-500 uppercase tracking-widest mb-2">Stepantsminda</h2>
        <h3 class="text-3xl font-black mb-8">What's for dinner?</h3>
        <div id="restaurant-list" class="space-y-6"></div>
    </div>

    <div id="menu-page" class="page pb-40">
        <div id="menu-hero" class="h-72 bg-cover bg-center relative">
            <button onclick="navTo('home-page')" class="absolute top-14 left-6 w-12 h-12 bg-black/50 rounded-full flex items-center justify-center">←</button>
        </div>
        <div class="px-6 -mt-12 bg-[#050505] rounded-t-[45px] pt-10 min-h-screen">
            <h2 id="menu-title" class="text-4xl font-black mb-8"></h2>
            <div id="menu-items-container" class="space-y-4"></div>
        </div>
    </div>

    <div id="orders-page" class="page pt-16 px-6">
        <h2 class="text-4xl font-black mb-10">My Orders</h2>
        <div id="active-order-card" class="hidden bg-[#121212] p-8 rounded-[35px] border border-white/5">
            <div class="flex justify-between items-center mb-6">
                <span class="bg-yellow-500 text-black px-3 py-1 rounded-lg text-xs font-bold uppercase">Preparing</span>
                <span id="order-price" class="font-black text-xl">0 GEL</span>
            </div>
            <div class="h-2 bg-white/5 rounded-full overflow-hidden">
                <div id="order-progress" class="h-full bg-yellow-500 transition-all duration-1000" style="width: 10%"></div>
            </div>
            <p class="text-gray-500 mt-4 text-center text-sm font-medium">Chef is making your magic... 👨‍🍳</p>
        </div>
    </div>

    <div id="checkout-bar" onclick="processPayment()">
        <span class="tracking-widest">VIEW CART</span>
        <span id="cart-total" class="text-xl italic">0 GEL</span>
    </div>

    <nav id="main-nav">
        <div class="nav-item active-pill" onclick="navTo('home-page', this)"><span>🏠</span><span class="nav-text">Home</span></div>
        <div class="nav-item" onclick="navTo('orders-page', this)"><span>📦</span><span class="nav-text">Orders</span></div>
        <div class="nav-item" onclick="navTo('login-page', this)"><span>👤</span><span class="nav-text">Exit</span></div>
    </nav>

    <script>
        let cart = [];
        const data = {
            graf: { name: "Graf Shaurma", img: "https://images.unsplash.com/photo-1561758033-d89a9ad46330?w=800", menu: [{n:"Maxi Shaurma", p:16}, {n:"Hot Dog XXL", p:10}, {n:"Cold Cola", p:4}] },
            panorama: { name: "Panorama", img: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800", menu: [{n:"Royal Khinkali", p:18}, {n:"Kupati", p:22}] },
            teravino: { name: "Teravino", img: "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=800", menu: [{n:"Saperavi Wine", p:40}, {n:"Wine Platter", p:35}] },
            ska: { name: "Ska Market", img: "https://images.unsplash.com/photo-1542838132-92c53300491e?w=800", menu: [{n:"Milk 1L", p:5}, {n:"Fresh Bread", p:2}, {n:"Local Cheese", p:12}] }
        };

        function login() { 
            navTo('home-page'); 
            document.getElementById('main-nav').classList.add('show');
        }

        function navTo(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-pill'));
                el.classList.add('active-pill');
            }
            window.scrollTo(0,0);
        }

        function renderHome() {
            document.getElementById('restaurant-list').innerHTML = Object.entries(data).map(([key, val]) => `
                <div class="bg-[#121212] rounded-[35px] overflow-hidden border border-white/5 active:scale-[0.97] transition" onclick="openMenu('${key}')">
                    <img src="${val.img}" class="h-52 w-full object-cover">
                    <div class="p-6">
                        <h4 class="text-2xl font-black">${val.name}</h4>
                        <p class="text-gray-500 font-bold">★ 4.9 • 20-30 min</p>
                    </div>
                </div>
            `).join('');
        }

        function openMenu(key) {
            const res = data[key];
            document.getElementById('menu-hero').style.backgroundImage = `url('${res.img}')`;
            document.getElementById('menu-title').innerText = res.name;
            document.getElementById('menu-items-container').innerHTML = res.menu.map(item => `
                <div class="bg-[#121212] p-6 rounded-[28px] flex justify-between items-center mb-4">
                    <div><h4 class="font-bold text-lg">${item.n}</h4><p class="text-yellow-500 font-black">${item.p} GEL</p></div>
                    <button onclick="addToCart('${item.n}', ${item.p}); event.stopPropagation();" class="w-12 h-12 bg-white/10 rounded-2xl font-bold text-xl">+</button>
                </div>
            `).join('');
            navTo('menu-page');
        }

        function addToCart(n, p) {
            cart.push({n, p});
            const total = cart.reduce((s, i) => s + i.p, 0);
            document.getElementById('cart-total').innerText = total + " GEL";
            document.getElementById('checkout-bar').style.display = 'flex';
        }

        function processPayment() {
            const total = cart.reduce((s, i) => s + i.p, 0);
            const btn = document.getElementById('checkout-bar');
            btn.innerHTML = "PROCESSING...";
            
            setTimeout(() => {
                alert("Order Placed Successfully! 🚀");
                document.getElementById('order-price').innerText = total + " GEL";
                document.getElementById('active-order-card').classList.remove('hidden');
                document.getElementById('checkout-bar').style.display = 'none';
                cart = [];
                navTo('orders-page');
                
                // Animation for the tracking bar
                setTimeout(() => {
                    document.getElementById('order-progress').style.width = "70%";
                }, 1000);
            }, 2000);
        }

        renderHome();
    </script>
</body>
</html>
