<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KaDelivery Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0A0A0A; --card: #161616; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--dark); 
            color: white; 
            margin: 0;
            padding: 0;
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .glow { position: fixed; top: -10%; right: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, rgba(0,0,0,0) 70%); z-index: -1; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; }
        .gold-gradient { background: linear-gradient(135deg, #F5D17E 0%, #D4AF37 50%, #B8860B 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Fixed Navigation System */
        .page { 
            display: none; 
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .page.active { 
            display: block !important; 
            opacity: 1;
            transform: translateY(0);
        }
        
        .tap-scale { transition: transform 0.1s ease; cursor: pointer; position: relative; z-index: 10; }
        .tap-scale:active { transform: scale(0.95); }
        
        .category-chip { padding: 8px 20px; border-radius: 50px; background: #1a1a1a; border: 1px solid #333; font-size: 0.8rem; white-space: nowrap; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="glow"></div>

    <div id="login-page" class="page active flex flex-col items-center justify-center min-h-screen px-10">
        <div class="mb-10 text-center">
            <h1 class="text-6xl font-extrabold tracking-tighter gold-gradient">Ka</h1>
            <h2 class="text-2xl font-light tracking-widest uppercase text-gray-400">Delivery</h2>
        </div>
        
        <div class="glass p-8 w-full space-y-6">
            <div class="space-y-1">
                <label class="text-xs uppercase tracking-widest text-gray-500 ml-2">Username</label>
                <input type="text" id="user-input" placeholder="Gamer123" class="w-full bg-[#111] rounded-2xl p-4 border border-white/5 outline-none">
            </div>
            <button type="button" id="enter-btn" onclick="navTo('home-page')" class="tap-scale w-full py-5 rounded-2xl bg-gradient-to-r from-[#F5D17E] to-[#B8860B] text-black font-black text-lg shadow-2xl">
                ENTER THE KITCHEN
            </button>
        </div>
    </div>

    <div id="home-page" class="page min-h-screen pb-24">
        <nav class="flex justify-between items-center px-6 pt-10 mb-8">
            <div class="flex flex-col">
                <span class="text-xs text-gray-500 uppercase tracking-widest">Delivering to</span>
                <span class="text-lg font-bold">Stepantsminda, Kazbegi 📍</span>
            </div>
            <div class="w-12 h-12 glass flex items-center justify-center border-white/10">🔔</div>
        </nav>

        <div class="flex space-x-3 px-6 overflow-x-auto no-scrollbar mb-8">
            <div class="category-chip bg-[#D4AF37] text-black font-bold border-none">All Food</div>
            <div class="category-chip">Georgian</div>
            <div class="category-chip">Burgers</div>
            <div class="category-chip">Shaurma</div>
        </div>

        <section class="px-6 space-y-6">
            <div onclick="openMenu('panorama')" class="tap-scale glass overflow-hidden">
                <div class="relative h-48">
                    <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=800" class="w-full h-full object-cover" alt="Panorama">
                    <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                </div>
                <div class="p-5">
                    <h3 class="text-xl font-bold">Panorama Kazbegi</h3>
                    <p class="text-sm text-gray-400">Premium Georgian • ★ 5.0</p>
                </div>
            </div>

            <div onclick="openMenu('graf')" class="tap-scale glass overflow-hidden">
                <div class="relative h-48">
                    <img src="https://images.unsplash.com/photo-1529006557810-274b9b2fc78a?auto=format&fit=crop&w=800" class="w-full h-full object-cover" alt="Shaurma">
                    <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                </div>
                <div class="p-5">
                    <h3 class="text-xl font-bold">Graf Shaurma</h3>
                    <p class="text-sm text-gray-400">Street King • ★ 4.8</p>
                </div>
            </div>
        </section>

        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass py-4 px-10 flex justify-between items-center z-50">
            <span class="text-xl" onclick="navTo('home-page')">🏠</span>
            <div class="w-14 h-14 bg-[#D4AF37] rounded-full flex items-center justify-center -mt-12 border-[6px] border-[#0A0A0A]">🛒</div>
            <span class="text-xl opacity-40">👤</span>
        </div>
    </div>

    <div id="menu-page" class="page px-6 pt-10 min-h-screen">
        <button onclick="navTo('home-page')" class="w-12 h-12 glass flex items-center justify-center mb-8">←</button>
        <h2 id="menu-title" class="text-4xl font-black mb-8 gold-gradient">Menu</h2>
        <div id="menu-items" class="space-y-4"></div>
    </div>

    <script>
        // Core Navigation Logic
        function navTo(pageId) {
            console.log("Navigating to:", pageId);
            
            // 1. Find all pages
            const pages = document.querySelectorAll('.page');
            const target = document.getElementById(pageId);
            
            if (!target) {
                console.error("Page not found:", pageId);
                return;
            }

            // 2. Hide everything
            pages.forEach(p => {
                p.classList.remove('active');
                p.style.display = 'none';
            });

            // 3. Show target
            target.style.display = 'block';
            // Small timeout to allow 'display: block' to register before adding the 'active' class (for animation)
            setTimeout(() => {
                target.classList.add('active');
            }, 10);

            window.scrollTo(0, 0);
        }

        const menus = {
            panorama: {
                title: "Panorama",
                items: [
                    { name: "Royal Khinkali", desc: "10 pcs hand-minced", price: "18 GEL" },
                    { name: "Truffle Khachapuri", desc: "Cheese & truffle oil", price: "24 GEL" }
                ]
            },
            graf: {
                title: "Graf Shaurma",
                items: [
                    { name: "Emperor Combo", desc: "Shaurma, Fries, Drink", price: "22 GEL" },
                    { name: "Cheese Blast", desc: "Double cheese meat", price: "17 GEL" }
                ]
            }
        };

        function openMenu(resId) {
            const res = menus[resId];
            document.getElementById('menu-title').innerText = res.title;
            const container = document.getElementById('menu-items');
            container.innerHTML = res.items.map(i => `
                <div class="glass p-6 flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-lg">${i.name}</h4>
                        <p class="text-gray-500 text-xs">${i.desc}</p>
                    </div>
                    <div class="text-[#D4AF37] font-black">${i.price}</div>
                </div>
            `).join('');
            navTo('menu-page');
        }
    </script>
</body>
</html>
