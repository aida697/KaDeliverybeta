<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KaDelivery Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f0f0f; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .gold-text { background: linear-gradient(45deg, #ffd700, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gold { background: linear-gradient(45deg, #ffd700, #ff8c00); color: black; font-weight: bold; transition: 0.3s; }
        .btn-gold:active { transform: scale(0.95); }
        .page { display: none; animation: fadeIn 0.5s ease-out forwards; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .restaurant-card { transition: 0.4s; cursor: pointer; }
        .restaurant-card:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="login-page" class="page active flex flex-col items-center justify-center h-screen px-8 text-center">
        <h1 class="text-5xl font-extrabold mb-2 gold-text">KaDelivery</h1>
        <p class="text-gray-400 mb-12">The Sexiest Food in Georgia 🇬🇪</p>
        
        <div class="glass p-8 w-full max-w-sm">
            <input type="text" placeholder="Your Name" class="w-full bg-transparent border-b border-gray-600 p-3 mb-6 focus:outline-none focus:border-orange-400 transition">
            <input type="password" placeholder="Passcode" class="w-full bg-transparent border-b border-gray-600 p-3 mb-10 focus:outline-none focus:border-orange-400 transition">
            <button onclick="navTo('home-page')" class="btn-gold w-full py-4 rounded-full shadow-lg shadow-orange-500/20">LET'S EAT</button>
        </div>
    </div>

    <div id="home-page" class="page px-6 py-12">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold">What's Cooking?</h2>
                <p class="text-gray-400">Stepantsminda & Beyond</p>
            </div>
            <div class="w-12 h-12 rounded-full border-2 border-orange-400 overflow-hidden">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User">
            </div>
        </header>

        <div onclick="openMenu('panorama')" class="restaurant-card glass mb-6 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=800&q=80" class="h-48 w-full object-cover opacity-80" alt="Panorama">
            <div class="p-6">
                <h3 class="text-2xl font-bold">Panorama Kazbegi</h3>
                <p class="text-orange-400 text-sm mb-2 font-semibold">Georgian Classics • 4.9 ★</p>
                <p class="text-gray-400 text-sm">Authentic khinkali with breathtaking mountain vibes.</p>
            </div>
        </div>

        <div onclick="openMenu('graf')" class="restaurant-card glass overflow-hidden">
            <img src="https://images.unsplash.com/photo-1561758033-d89a9ad46330?auto=format&fit=crop&w=800&q=80" class="h-48 w-full object-cover opacity-80" alt="Shaurma">
            <div class="p-6">
                <h3 class="text-2xl font-bold">Graf Shaurma</h3>
                <p class="text-orange-400 text-sm mb-2 font-semibold">Street Food • 4.7 ★</p>
                <p class="text-gray-400 text-sm">Best combo in town. Fries, Cola, and the perfect Shaurma.</p>
            </div>
        </div>
    </div>

    <div id="menu-page" class="page px-6 py-12">
        <button onclick="navTo('home-page')" class="mb-6 text-orange-400 font-bold">← BACK</button>
        <h2 id="menu-title" class="text-4xl font-extrabold mb-8 gold-text">Menu</h2>
        <div id="menu-items" class="space-y-4">
            </div>
    </div>

    <script>
        const menus = {
            panorama: {
                title: "Panorama Kazbegi",
                items: [
                    { name: "Mountain Khinkali", desc: "Hand-rolled veal & pork dumplings", price: "12 GEL" },
                    { name: "Ajaruli Khachapuri", desc: "Cheese boat with fresh butter and egg", price: "15 GEL" },
                    { name: "Mtsvadi (Pork)", desc: "Grilled pork skewers with pomegranate", price: "18 GEL" }
                ]
            },
            graf: {
                title: "Graf Shaurma",
                items: [
                    { name: "The OG Combo", desc: "Large Shaurma + Fries + Coca-Cola", price: "19 GEL" },
                    { name: "Cheese Bomb", desc: "Shaurma with triple mozzarella melt", price: "16 GEL" },
                    { name: "Spicy Graf", desc: "Shaurma with secret hot adjika sauce", price: "14 GEL" }
                ]
            }
        };

        function navTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function openMenu(resId) {
            const res = menus[resId];
            document.getElementById('menu-title').innerText = res.title;
            const container = document.getElementById('menu-items');
            container.innerHTML = res.items.map(i => `
                <div class="glass p-5 flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-lg">${i.name}</h4>
                        <p class="text-gray-400 text-xs">${i.desc}</p>
                    </div>
                    <div class="text-orange-400 font-bold">${i.price}</div>
                </div>
            `).join('');
            navTo('menu-page');
        }
    </script>
</body>
</html>
