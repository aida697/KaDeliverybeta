<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KaDelivery Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #FFD700; --bg: #050505; --card: #121212; --nav: rgba(18, 18, 18, 0.8); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        .page { display: none; min-height: 100vh; opacity: 0; transform: scale(0.96); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .page.active { display: block; opacity: 1; transform: scale(1); }

        /* Floating Nav Bar (Dribbble Style) */
        #main-nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150%);
            width: 90%; max-width: 400px; background: var(--nav); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #main-nav.show { transform: translateX(-50%) translateY(0); }
        
        .nav-item { position: relative; padding: 10px; border-radius: 50%; transition: 0.3s; }
        .nav-item.active-pill { background: var(--brand); color: black; border-radius: 25px; padding: 10px 20px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .nav-text { display: none; font-size: 12px; }
        .nav-item.active-pill .nav-text { display: block; }

        /* Restaurant Cards */
        .res-card { background: var(--card); border-radius: 32px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Modal Overlay */
        #cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; z-index: 2000; opacity: 0; transition: 0.3s; }
        .active-overlay { display: block !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="login-page" class="page active flex flex-col items-center justify-center px-10">
        <div class="w-20 h-20 bg-[#FFD700] rounded-[28px] flex items-center justify-center mb-6 shadow-2xl shadow-yellow-500/20">
            <span class="text-black text-4xl font-black italic">Ka</span>
        </div>
        <h1 class="text-3xl font-extrabold mb-8">Premium Delivery</h1>
        <input type="tel" placeholder="+995" class="w-full bg-[#111] rounded-2xl p-5 mb-4 outline-none border border-white/5">
        <button onclick="login()" class="w-full py-5 bg-[#FFD700] text-black font-black rounded-2xl shadow-xl active:scale-95 transition">ENTER THE KITCHEN</button>
    </div>

    <div id="home-page" class="page pb-32 pt-14 px-6">
        <div class="flex justify-between items-center mb-8">
            <div><p class="text-gray-500 text-xs font-bold uppercase">Welcome to</p><h2 class="text-2xl font-black">Stepantsminda 🇬🇪</h2></div>
            <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center">🔔</div>
        </div>

        <div class="flex space-x-3 overflow-x-auto no-scrollbar mb-8">
            <button class="px-6 py-3 bg-[#FFD700] text-black rounded-full font-bold">All</button>
            <button class="px-6 py-3 bg-white/5 rounded-full font-medium">Grocery</button>
            <button class="px-6 py-3 bg-white/5 rounded-full font-medium">Georgian</button>
        </div>

        <div id="restaurant-list" class="space-y-6">
            </div>
    </div>

    <div id="search-page" class="page pt-14 px-6">
        <h2 class="text-3xl font-black mb-6">Search</h2>
        <input type="text" placeholder="Search for Khinkali..." class="w-full bg-white/5 rounded-2xl p-5 outline-none border border-white/10 mb-8">
        <div class="grid grid-cols-2 gap-4">
            <div class="h-32 bg-white/5 rounded-3xl flex items-center justify-center font-bold">Fast Food</div>
            <div class="h-32 bg-white/5 rounded-3xl flex items-center justify-center font-bold">Wine Shop</div>
        </div>
    </div>

    <div id="orders-page" class="page pt-14 px-6">
        <h2 class="text-3xl font-black mb-8">Active Orders</h2>
        <div class="res-card p-6 border-l-4 border-yellow-500">
            <div class="flex justify-between mb-4"><div><h4 class="font-bold">Graf Shaurma</h4><p class="text-xs text-gray-500">Processing...</p></div><span class="text-yellow-500">22 GEL</span></div>
            <div class="h-1 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-yellow-500 w-1/3"></div></div>
        </div>
    </div>

    <div id="menu-page" class="page pb-32">
        <div id="menu-hero" class="h-64 relative bg-cover bg-center">
            <button onclick="navTo('home-page')" class="absolute top-12 left-6 w-12 h-12 bg-black/40 backdrop-blur-xl rounded-full flex items-center justify-center">←</button>
        </div>
        <div class="px-6 -mt-10 bg-[#050505] rounded-t-[40px] pt-8 min-h-screen">
            <h2 id="menu-title" class="text-3xl font-black mb-6"></h2>
            <div id="menu-items-container" class="space-y-4"></div>
        </div>
    </div>

    <nav id="main-nav">
        <div class="nav-item active-pill" onclick="navTo('home-page', this)"><span>🏠</span><span class="nav-text">Home</span></div>
        <div class="nav-item" onclick="navTo('search-page', this)"><span>🔍</span><span class="nav-text">Search</span></div>
        <div class="nav-item" onclick="navTo('orders-page', this)"><span>📦</span><span class="nav-text">Orders</span></div>
        <div class="nav-item" onclick="navTo('login-page', this)"><span>👤</span><span class="nav-text">Profile</span></div>
    </nav>

    <script>
        const data = {
            graf: { name: "Graf Shaurma", cat: "Fast Food", img: "https://images.unsplash.com/photo-1561758033-d89a9ad46330?w=800", menu: [{n:"Maxi Shaurma", p:16}, {n:"Hot Dog XXL", p:10}, {n:"Cold Coca-Cola", p:4}] },
            panorama: { name: "Panorama", cat: "Georgian", img: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800", menu: [{n:"Royal Khinkali", p:18}, {n:"Kupati", p:20}] },
            teravino: { name: "Teravino", cat: "Wine & Dine", img: "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=800", menu: [{n:"Saperavi", p:40}, {n:"Wine Tasting Platter", p:35}] },
            ska: { name: "Ska Market", cat: "Grocery", img: "https://images.unsplash.com/photo-1542838132-92c53300491e?w=800", menu: [{n:"Milk", p:5}, {n:"Fresh Bread", p:2}, {n:"Local Cheese", p:12}] }
        };

        function login() {
            navTo('home-page');
            document.getElementById('main-nav').classList.add('show');
        }

        function navTo(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-pill'));
                el.classList.add('active-pill');
            }
            if(id === 'login-page') document.getElementById('main-nav').classList.remove('show');
            window.scrollTo(0,0);
        }

        function renderHome() {
            const container = document.getElementById('restaurant-list');
            container.innerHTML = Object.entries(data).map(([key, val]) => `
                <div class="res-card active:scale-95 transition" onclick="openMenu('${key}')">
                    <img src="${val.img}" class="h-48 w-full object-cover opacity-80">
                    <div class="p-6">
                        <h4 class="text-xl font-black">${val.name}</h4>
                        <p class="text-gray-500 text-sm">${val.cat} • ★ 4.8</p>
                    </div>
                </div>
            `).join('');
        }

        function openMenu(key) {
            const res = data[key];
            document.getElementById('menu-hero').style.backgroundImage = `url('${res.img}')`;
            document.getElementById('menu-title').innerText = res.name;
            document.getElementById('menu-items-container').innerHTML = res.menu.map(item => `
                <div class="res-card p-5 flex justify-between items-center">
                    <div><p class="font-bold">${item.n}</p><p class="text-[#FFD700] font-black">${item.p} GEL</p></div>
                    <button class="w-10 h-10 bg-white/10 rounded-xl">+</button>
                </div>
            `).join('');
            navTo('menu-page');
        }

        renderHome();
    </script>
</body>
</html>
